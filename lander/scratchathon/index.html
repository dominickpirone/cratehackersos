<!--
====================================================================
  THE SCRATCHATHON — A/B ROTATOR  ·  /scratchathon
  Assigns each visitor a variant (boombox | dangerous), remembers it
  (localStorage + 30-day cookie shared across *.cratehackers.com), and
  redirects to that variant. Returning visitors always see the same one.
  Force a variant for testing/ads:  /scratchathon?v=boombox  (or ?v=dangerous)
  Carries gclid / fbclid / utm_* straight through the redirect.
  The matching thank-you page (/scratchathon-ty) is shared by both.
====================================================================
-->
<noscript><meta http-equiv="refresh" content="0; url=/scratchathon/boombox.html"></noscript>
<style>
  html,body{margin:0;height:100%;background:#0b0b0d;color:#c6c3cc;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;}
  .wrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:24px;text-align:center;
    background:
      radial-gradient(70% 50% at 15% 0%, rgba(255,61,129,.16), transparent 60%),
      radial-gradient(70% 50% at 100% 4%, rgba(37,211,211,.13), transparent 58%),
      #0b0b0d;}
  .lockup{font-family:'Bungee','Arial Black',sans-serif;font-weight:700;font-size:15px;letter-spacing:.02em;text-transform:uppercase;color:#f4f2ec;}
  .lockup b{color:#f5c542;} .lockup .x{color:#ff3d81;margin:0 6px;}
  .dots{display:flex;gap:9px;}
  .dots i{width:11px;height:11px;border-radius:50%;display:block;
    background:linear-gradient(180deg,#f5c542,#ff6a00);animation:b 1s ease-in-out infinite;}
  .dots i:nth-child(2){animation-delay:.16s}.dots i:nth-child(3){animation-delay:.32s}
  @keyframes b{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-6px)}}
  .tag{font-family:'Bungee','Arial Black',sans-serif;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#25d3d3;}
  noscript a{color:#f5c542;}
  @media (prefers-reduced-motion: reduce){ .dots i{animation:none;} }
</style>
</head>
<body>
<div class="wrap">
  <div class="lockup">CRATE <b>HACKERS</b> <span class="x">&times;</span> DANGEROUS DJs</div>
  <div class="dots"><i></i><i></i><i></i></div>
  <div class="tag">Loading the Scratchathon&hellip;</div>
  <noscript><a href="/scratchathon/boombox.html">Enter &rarr;</a></noscript>
</div>
<script>
(function(){
  // variant value -> file. ?v=boombox / ?v=dangerous forces one (ads / QA).
  var MAP={boombox:'boombox.html', dangerous:'dangerous-djs.html'};
  var VARIANTS=['boombox','dangerous'];
  var qs=new URLSearchParams(location.search);
  var forced=qs.get('v');
  var v=(forced&&MAP[forced])?forced:localStorage.getItem('scratchathon_variant');
  if(VARIANTS.indexOf(v)===-1){ v=VARIANTS[Math.floor(Math.random()*VARIANTS.length)]; } // sticky 50/50 split
  localStorage.setItem('scratchathon_variant',v);
  var dom=/(^|\.)cratehackers\.com$/.test(location.hostname)?';domain=.cratehackers.com':''; // share variant across lander/www/checkout
  document.cookie='scratchathon_variant='+v+';path=/'+dom+';max-age=2592000;samesite=lax';
  window.dataLayer=window.dataLayer||[];
  window.dataLayer.push({event:'scratchathon_variant_assigned',variant:v}); // wire into GA4 to see which page converts
  location.replace('/scratchathon/'+MAP[v]+location.search);               // carries gclid/fbclid/utm_* through
})();
</script>
</body>
