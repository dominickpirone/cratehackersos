<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>You're in! — R&B Crate Hackathon with DJ POPO</title>
<meta name="robots" content="noindex">
<!--
====================================================================
  R&B CRATE HACKATHON — THANK-YOU ROUTER  ·  /hackathon-popo-ty
  Reads the visitor's split-test variant (set by /hackathon-popo) and
  shows the MATCHING thank-you theme so the experience stays consistent.
  Point your Kartra opt-in's post-signup redirect at this URL.
  No cookie yet (e.g. direct hit)? Falls back to the jewel theme.
====================================================================
-->
<noscript><meta http-equiv="refresh" content="0; url=/hackathon-popo-ty/jewel.html"></noscript>
<style>
  html,body{margin:0;height:100%;background:#0b0710;color:#caa9b6;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;}
  .wrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:24px;text-align:center;}
  img{height:54px;width:auto;opacity:.95;}
  .dots{display:flex;gap:9px;}
  .dots i{width:10px;height:10px;border-radius:50%;display:block;
    background:linear-gradient(180deg,#f1cf80,#9c7320);animation:b 1s ease-in-out infinite;}
  .dots i:nth-child(2){animation-delay:.16s}.dots i:nth-child(3){animation-delay:.32s}
  @keyframes b{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-6px)}}
  .tag{font-size:12px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;}
  noscript a{color:#f1cf80;}
  @media (prefers-reduced-motion: reduce){ .dots i{animation:none;} }
</style>
</head>
<body>
<div class="wrap">
  <img src="https://d11n7da8rpqbjy.cloudfront.net/thedjsvault/26660530_16468968032PaCrate_Hackers_Logowhite_1.jpg" alt="Crate Hackers">
  <div class="dots"><i></i><i></i><i></i></div>
  <div class="tag">Confirming your spot…</div>
  <noscript><a href="/hackathon-popo-ty/jewel.html">Continue →</a></noscript>
</div>
<script>
(function(){
  var VARIANTS=['jewel','storm'];
  function cookie(n){ var m=document.cookie.match('(?:^|; )'+n+'=([^;]*)'); return m?decodeURIComponent(m[1]):null; }
  var v=cookie('popo_variant') || localStorage.getItem('popo_variant');
  if(VARIANTS.indexOf(v)===-1){ v='jewel'; }                 // direct hit / unknown → primary theme
  location.replace('/hackathon-popo-ty/'+v+'.html'+location.search);
})();
</script>
</body>
</html>
